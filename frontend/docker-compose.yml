version: "3.9"

services:
  mongodb:
    image: mongo:6.0
    container_name: xshare-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: xshare
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: xshare-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/xshare
      JWT_SECRET: your_secret_key
    depends_on:
      - mongodb
    volumes:
      - ./backend:/usr/src/app
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: xshare-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
    command: npm run dev

volumes:
  mongo_data:
